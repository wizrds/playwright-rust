# cargo-mutants configuration
# Run with: cargo mutants
# See: https://mutants.rs/config.html

# Only mutate source files with unit test coverage.
# Integration tests (requiring Playwright server) are too slow for mutation testing.
examine_globs = [
    "crates/playwright/src/protocol/locator.rs",
    "crates/playwright/src/protocol/evaluate_conversion.rs",
    "crates/playwright/src/protocol/action_options.rs",
    "crates/playwright/src/protocol/click.rs",
    "crates/playwright/src/protocol/screenshot.rs",
    "crates/playwright/src/protocol/drop_options.rs",
    "crates/playwright/src/protocol/select_option.rs",
    "crates/playwright/src/api/launch_options.rs",
    "crates/playwright/src/protocol/tap.rs",
    "crates/playwright/src/protocol/drag_to.rs",
    "crates/playwright/src/protocol/wait_for.rs",
]

# Only run unit tests and fast serialization tests (no Playwright server needed).
additional_cargo_test_args = [
    "--lib",
    "--test", "browser_context_serialization_test",
    "--test", "file_payload_test",
    "--test", "playwright_version_test",
]

# Exclude mutations that are only testable via integration tests (require Playwright server)
# or represent serde_json limitations (cannot distinguish special float behavior).
exclude_re = [
    # Builder constructors — trivially correct, integration-test-only
    "Options::builder",
    "ScreenshotOptions::builder",

    # Locator methods that delegate to Frame RPC — only testable with Playwright server
    "Locator::count",
    "Locator::all ",
    "Locator::text_content",
    "Locator::inner_text",
    "Locator::inner_html",
    "Locator::get_attribute",
    "Locator::input_value",
    "Locator::is_visible",
    "Locator::is_enabled",
    "Locator::is_checked",
    "Locator::is_editable",
    "Locator::is_hidden",
    "Locator::is_disabled",
    "Locator::is_focused",
    "Locator::click",
    "Locator::dblclick",
    "Locator::fill",
    "Locator::clear",
    "Locator::press ",
    "Locator::check",
    "Locator::uncheck",
    "Locator::set_checked",
    "Locator::hover",
    "Locator::select_option",
    "Locator::set_input_files",
    "Locator::screenshot",
    "Locator::evaluate_js",
    "Locator::focus",
    "Locator::blur",
    "Locator::press_sequentially",
    "Locator::all_inner_texts",
    "Locator::all_text_contents",
    "Locator::dispatch_event",
    "Locator::bounding_box",
    "Locator::scroll_into_view_if_needed",
    "Locator::tap",
    "Locator::evaluate",
    "Locator::evaluate_all",
    "Locator::drag_to",
    "Locator::drop",
    "Locator::with_timeout",
    "Locator::wait_for",
    "Locator::aria_snapshot",
    "Locator::highlight",
    "Locator::selector",
    "Locator::mask_json",
    "Locator::wrap_error",
    "impl std::fmt::Debug for Locator",

    # Fluent builder setters — trivially correct, integration-test-only
    "LaunchOptions::.* -> Self",
    "OptionsBuilder::.* -> Self",

    # PressSequentiallyOptions — only exercised by integration tests
    "PressSequentiallyOptions",

    # serde_json cannot represent Infinity/NaN/-0, match arms are indistinguishable
    "delete match arm .*(Infinity|NaN|null.*undefined|ui8)",
    "replace == with != in serialize_value",
    "delete - in parse_value",
]
