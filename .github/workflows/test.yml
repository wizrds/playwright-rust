name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  msrv:
    name: MSRV Check (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install MSRV toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: "1.88"

    - name: Check compilation on MSRV
      run: cargo check --workspace

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Cache Cargo
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Cache Playwright Browsers (Linux/macOS)
      if: runner.os != 'Windows'
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/ms-playwright
          ~/Library/Caches/ms-playwright
        key: ${{ runner.os }}-playwright-browsers-1.60.0-v2
        restore-keys: |
          ${{ runner.os }}-playwright-browsers-1.60.0-

    - name: Cache Playwright Browsers (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v5
      with:
        path: ~\AppData\Local\ms-playwright
        key: ${{ runner.os }}-playwright-browsers-1.60.0-v2
        restore-keys: |
          ${{ runner.os }}-playwright-browsers-1.60.0-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Install expect (issue #59 reproducer harness)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y expect

    - name: Build
      run: cargo build --verbose

    - name: Install Playwright browsers
      run: cargo run --release --bin playwright-rs --features cli -- install chromium firefox webkit${{ runner.os == 'Linux' && ' --with-deps' || '' }}

    - name: Run tests (Linux/macOS)
      if: runner.os != 'Windows'
      run: cargo nextest run --workspace --profile ci

    - name: Run stress tests (Linux/macOS)
      if: runner.os != 'Windows'
      run: cargo nextest run --workspace --profile ci --run-ignored ignored-only

    - name: Run tests (Windows)
      if: runner.os == 'Windows'
      timeout-minutes: 30
      run: cargo nextest run --workspace --profile ci --test-threads=1

    - name: Run stress tests (Windows)
      if: runner.os == 'Windows'
      timeout-minutes: 30
      run: cargo nextest run --workspace --profile ci --run-ignored ignored-only --test-threads=1

    - name: Run doc-tests (ignored tests require browsers)
      run: cargo test --doc --workspace -- --ignored

    - name: Build all examples
      run: cargo build --package playwright-rs --examples

    - name: Generate documentation
      run: cargo doc --no-deps --workspace
